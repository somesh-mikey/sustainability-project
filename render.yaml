# Render Blueprint — deploys backend + frontend + PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: sustainability-db
    plan: free
    databaseName: sustainability_db
    user: sustainability_user

services:
  # ── Backend API ──
  - type: web
    name: sustainability-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sustainability-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://sustainability-frontend.onrender.com
    healthCheckPath: /

  # ── Frontend (Static Site) ──
  - type: static_site
    name: sustainability-frontend
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sustainability-api
          property: host
