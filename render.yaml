# Render Blueprint — deploys full-stack app (backend + frontend) + PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: sustainability-db
    plan: free
    databaseName: sustainability_db
    user: sustainability_user

services:
  - type: web
    name: sustainability-app
    runtime: node
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build && cd ..
    startCommand: npm run migrate && npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sustainability-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    healthCheckPath: /auth/login
    staticPublishPath: ./frontend/dist
